<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="bg-l" x1="0" y1="0" x2="800" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e6e9ee"/>
      <stop offset="1" stop-color="#dde1e8"/>
    </linearGradient>
    <linearGradient id="accent-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b7dd8" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#3b7dd8" stop-opacity="0.6"/>
      <stop offset="0.65" stop-color="#5a8fd4" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#3b7dd8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow1-l" cx="0.2" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a8c4e6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#dde1e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2-l" cx="0.8" cy="0.5" r="0.4">
      <stop offset="0" stop-color="#90b8c8" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#dde1e8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1-l">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="800" height="120" fill="url(#bg-l)"/>

  <ellipse cx="160" cy="60" rx="250" ry="140" fill="url(#glow1-l)" filter="url(#blur1-l)"/>
  <ellipse cx="640" cy="60" rx="220" ry="120" fill="url(#glow2-l)" filter="url(#blur1-l)"/>

  <!-- Accent line -->
  <rect x="200" y="56" width="400" height="2" rx="1" fill="url(#accent-l)" opacity="0.7"/>

  <!-- Left text -->
  <text x="200" y="48" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11" font-weight="400" fill="rgba(0,0,0,0.22)"
        text-anchor="start" letter-spacing="0.08em">
    SELECTED WORK
  </text>

  <!-- Right text -->
  <text x="600" y="48" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11" font-weight="400" fill="rgba(0,0,0,0.22)"
        text-anchor="end" letter-spacing="0.08em">
    FRANKFURT
  </text>

  <!-- Shimmer border -->
  <rect x="1" y="1" width="798" height="118" rx="8" ry="8"
        fill="none" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>
</svg>