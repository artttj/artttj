<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d0d14"/>
      <stop offset="1" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6eb5ff" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#6eb5ff" stop-opacity="0.6"/>
      <stop offset="0.7" stop-color="#88c8f0" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#6eb5ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.15" cy="0.3" r="0.5">
      <stop offset="0" stop-color="#1a3a6e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.7" r="0.4">
      <stop offset="0" stop-color="#0e3a3a" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0.55" cy="0.2" r="0.35">
      <stop offset="0" stop-color="#1a2e3e" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" fill="url(#bg)"/>

  <!-- Ambient blobs matching site aesthetic -->
  <ellipse cx="120" cy="66" rx="200" ry="160" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="680" cy="154" rx="180" ry="140" fill="url(#glow2)" filter="url(#blur1)"/>
  <ellipse cx="440" cy="44" rx="150" ry="100" fill="url(#glow3)" filter="url(#blur2)"/>

  <!-- Glass card border -->
  <rect x="28" y="24" width="744" height="172" rx="20" ry="20"
        fill="rgba(255,255,255,0.03)"
        stroke="rgba(255,255,255,0.08)"
        stroke-width="1"/>

  <!-- Top highlight line -->
  <line x1="60" y1="25" x2="740" y2="25" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>

  <!-- Name -->
  <text x="400" y="88" font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif"
        font-size="36" font-weight="600" fill="rgba(255,255,255,0.92)"
        text-anchor="middle" letter-spacing="-0.02em">
    Artyom Yagovdik
  </text>

  <!-- Accent line -->
  <rect x="300" y="106" width="200" height="1.5" rx="0.75" fill="url(#accent)" opacity="0.7"/>

  <!-- Role -->
  <text x="400" y="132" font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif"
        font-size="13" font-weight="300" fill="rgba(255,255,255,0.45)"
        text-anchor="middle" letter-spacing="0.12em">
    ENGINEERING LEAD · FRANKFURT
  </text>

  <!-- Bottom subtle tagline -->
  <text x="400" y="165" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11" font-weight="400" fill="rgba(255,255,255,0.25)"
        text-anchor="middle" letter-spacing="0.04em">
    dev tools · browser extensions · agentic experiments
  </text>

  <!-- Shimmer ring around card -->
  <rect x="28" y="24" width="744" height="172" rx="20" ry="20"
        fill="none" stroke="rgba(110,181,255,0.06)" stroke-width="2"/>
</svg>